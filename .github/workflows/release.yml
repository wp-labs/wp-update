name: Release

on:
  push:
    tags:
      - "wp-self-update-v*.*.*"
      - "wp-self-update-v*.*.*-dryrun"
      - "wp-installer-v*.*.*"
      - "wp-installer-v*.*.*-dryrun"

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve:
    name: Resolve Package
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.resolve.outputs.package }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - id: resolve
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            wp-self-update-v*)
              package="wp-self-update"
              ;;
            wp-installer-v*)
              package="wp-installer"
              ;;
            *)
              echo "unsupported tag: $tag" >&2
              exit 1
              ;;
          esac

          dry_run=false
          if [[ "$tag" == *-dryrun ]]; then
            dry_run=true
          fi

          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: resolve
    if: ${{ needs.resolve.outputs.dry_run != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [resolve, create-release]
    if: ${{ always() && needs.resolve.result == 'success' && (needs.create-release.result == 'success' || needs.resolve.outputs.dry_run == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo publish (dry run)
        if: ${{ needs.resolve.outputs.dry_run == 'true' }}
        run: cargo publish -p ${{ needs.resolve.outputs.package }} --dry-run
      - name: Cargo publish
        if: ${{ needs.resolve.outputs.dry_run != 'true' }}
        run: cargo publish -p ${{ needs.resolve.outputs.package }} --token ${{ secrets.CRATES_IO_TOKEN }}
