name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-dryrun"

env:
  CARGO_TERM_COLOR: always

jobs:
  resolve:
    name: Resolve Package
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.resolve.outputs.package }}
      dry_run: ${{ steps.resolve.outputs.dry_run }}
    steps:
      - id: resolve
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          case "$tag" in
            v*)
              package="wp-self-update"
              ;;
            *)
              echo "unsupported tag: $tag" >&2
              exit 1
            ;;
          esac

          dry_run=false
          if [[ "$tag" == *-dryrun ]]; then
            dry_run=true
          fi

          echo "package=$package" >> "$GITHUB_OUTPUT"
          echo "dry_run=$dry_run" >> "$GITHUB_OUTPUT"

  build-installer:
    name: Build wp-installer Artifacts
    runs-on: ${{ matrix.os }}
    needs: [resolve, create-release]
    if: ${{ always() && needs.resolve.result == 'success' && (needs.create-release.result == 'success' || needs.resolve.outputs.dry_run == 'true') }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_target: x86_64-unknown-linux-gnu
          - os: macos-14
            artifact_target: aarch64-apple-darwin
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build wp-installer
        run: cargo build -p wp-installer --release
      - name: Package artifact
        shell: bash
        run: |
          mkdir -p dist/artifacts
          cp target/release/wp-installer dist/artifacts/wp-installer
          tar -C dist -czf "wp-installer-${GITHUB_REF_NAME}-${{ matrix.artifact_target }}.tar.gz" artifacts
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wp-installer-${{ matrix.artifact_target }}
          path: wp-installer-${{ github.ref_name }}-${{ matrix.artifact_target }}.tar.gz
      - name: Attach artifact to GitHub Release
        if: ${{ needs.resolve.outputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          files: wp-installer-${{ github.ref_name }}-${{ matrix.artifact_target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: resolve
    if: ${{ needs.resolve.outputs.dry_run != 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [resolve, create-release]
    if: ${{ always() && needs.resolve.result == 'success' && (needs.create-release.result == 'success' || needs.resolve.outputs.dry_run == 'true') }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Cargo publish (dry run)
        if: ${{ needs.resolve.outputs.dry_run == 'true' }}
        run: cargo publish -p ${{ needs.resolve.outputs.package }} --dry-run
      - name: Cargo publish
        if: ${{ needs.resolve.outputs.dry_run != 'true' }}
        run: cargo publish -p ${{ needs.resolve.outputs.package }} --token ${{ secrets.CRATES_IO_TOKEN }}
